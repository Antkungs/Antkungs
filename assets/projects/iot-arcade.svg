<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 170" role="img" aria-label="IoT Arcade Machine">
  <defs>
    <linearGradient id="g5" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#ff2079"><animate attributeName="stop-color" values="#ff2079;#00f0ff;#a742f5;#ff2079" dur="9.5s" repeatCount="indefinite"/></stop><stop offset="50%" stop-color="#00f0ff"><animate attributeName="stop-color" values="#00f0ff;#a742f5;#ff2079;#00f0ff" dur="9.5s" repeatCount="indefinite"/></stop><stop offset="100%" stop-color="#a742f5"><animate attributeName="stop-color" values="#a742f5;#ff2079;#00f0ff;#a742f5" dur="9.5s" repeatCount="indefinite"/></stop></linearGradient>
    <filter id="f5" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 3D depth: dark extruded side + floor shadow behind the card -->
  <ellipse cx="230.0" cy="164" rx="200.0" ry="6" fill="#000000" opacity="0.45"/>
  <rect x="9" y="11" width="447" height="155" rx="14" fill="#04060c"/>
  <rect x="6" y="8" width="447" height="155" rx="14" fill="#080b14" stroke="#1b2233" stroke-width="1"/>
  <rect x="1.5" y="1.5" width="447" height="155" rx="14" fill="#0d1117" stroke="url(#g5)" stroke-width="2.5" filter="url(#f5)"/>
  <path d="M18 4.5 H430" stroke="#ffffff" stroke-width="1" opacity="0.14" stroke-linecap="round"/>
  <circle cx="428" cy="28" r="4" fill="#ff2079">
    <animate attributeName="opacity" values="1;0.15;1" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="412" cy="28" r="3" fill="#00f0ff">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="2.4s" repeatCount="indefinite"/>
  </circle>
  
  <g transform="translate(20,26)">
    <ellipse cx="16" cy="34" rx="15" ry="5" fill="none" stroke="#00f0ff" stroke-width="2.2"/>
    <g>
      <animateTransform attributeName="transform" type="rotate" values="-14 16 32;14 16 32;-14 16 32" dur="2.6s" repeatCount="indefinite"/>
      <line x1="16" y1="32" x2="16" y2="10" stroke="#ff2079" stroke-width="3.2" stroke-linecap="round"/>
      <circle cx="16" cy="7" r="5.5" fill="#ff2079"/>
    </g>
    <circle cx="30" cy="30" r="2.6" fill="#a742f5">
      <animate attributeName="opacity" values="1;0.2;1" dur="0.8s" repeatCount="indefinite"/>
    </circle>
  </g>
  <text x="86" y="52" font-family="Segoe UI,Arial,sans-serif" font-weight="700" font-size="19" fill="#ffffff">IoT Arcade Machine</text>
  <rect x="86" y="62" height="2.5" rx="1.25" fill="url(#g5)" width="0">
    <animate attributeName="width" values="0;338;338;0" dur="9.5s" repeatCount="indefinite"/>
  </rect>
  <text x="26" y="104" font-family="Segoe UI,Arial,sans-serif" font-size="13.5" fill="#8b949e">Physical free-kick game on Raspberry Pi</text>
  <rect x="26" y="124" width="38" height="22" rx="11" fill="#ff20791a" stroke="#ff2079" stroke-width="1"/><text x="45.0" y="139" text-anchor="middle" font-family="Courier New,monospace" font-size="11" fill="#ff2079">RPi</text><rect x="72" y="124" width="72" height="22" rx="11" fill="#00f0ff1a" stroke="#00f0ff" stroke-width="1"/><text x="108.0" y="139" text-anchor="middle" font-family="Courier New,monospace" font-size="11" fill="#00f0ff">MCP23017</text><rect x="152" y="124" width="58" height="22" rx="11" fill="#a742f51a" stroke="#a742f5" stroke-width="1"/><text x="181.0" y="139" text-anchor="middle" font-family="Courier New,monospace" font-size="11" fill="#a742f5">PyGame</text>
</svg>
