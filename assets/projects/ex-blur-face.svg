<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 170" role="img" aria-label="Blur-Face">
  <defs>
    <linearGradient id="g9" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#50fa7b"><animate attributeName="stop-color" values="#50fa7b;#ff2079;#00f0ff;#50fa7b" dur="7.7s" repeatCount="indefinite"/></stop><stop offset="50%" stop-color="#ff2079"><animate attributeName="stop-color" values="#ff2079;#00f0ff;#50fa7b;#ff2079" dur="7.7s" repeatCount="indefinite"/></stop><stop offset="100%" stop-color="#00f0ff"><animate attributeName="stop-color" values="#00f0ff;#50fa7b;#ff2079;#00f0ff" dur="7.7s" repeatCount="indefinite"/></stop></linearGradient>
    <filter id="f9" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect x="1.5" y="1.5" width="457" height="167" rx="14" fill="#0d1117" stroke="url(#g9)" stroke-width="2.5" filter="url(#f9)"/>
  <circle cx="428" cy="28" r="4" fill="#50fa7b">
    <animate attributeName="opacity" values="1;0.15;1" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="412" cy="28" r="3" fill="#ff2079">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="2.4s" repeatCount="indefinite"/>
  </circle>
  <text x="26" y="56" font-size="32">🕵️</text>
  <text x="74" y="52" font-family="Segoe UI,Arial,sans-serif" font-weight="700" font-size="19" fill="#ffffff">Blur-Face</text>
  <rect x="74" y="62" height="2.5" rx="1.25" fill="url(#g9)" width="0">
    <animate attributeName="width" values="0;350;350;0" dur="7.7s" repeatCount="indefinite"/>
  </rect>
  <text x="26" y="98" font-family="Segoe UI,Arial,sans-serif" font-size="13.5" fill="#8b949e">Auto face-blurring for privacy protection</text>
  <rect x="26" y="124" width="58" height="22" rx="11" fill="#50fa7b1a" stroke="#50fa7b" stroke-width="1"/><text x="55.0" y="139" text-anchor="middle" font-family="Courier New,monospace" font-size="11" fill="#50fa7b">Python</text><rect x="92" y="124" width="58" height="22" rx="11" fill="#ff20791a" stroke="#ff2079" stroke-width="1"/><text x="121.0" y="139" text-anchor="middle" font-family="Courier New,monospace" font-size="11" fill="#ff2079">OpenCV</text>
</svg>
