      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="8s" repeatCount="indefinite"/>
      <circle r="7" fill="none" stroke="#ff2079" stroke-width="2.2"/><rect x="-1.3" y="-11" width="2.6" height="5" rx="1" fill="#ff2079" transform="rotate(30)"/><rect x="-1.3" y="-11" width="2.6" height="5" rx="1" fill="#ff2079" transform="rotate(90)"/><rect x="-1.3" y="-11" width="2.6" height="5" rx="1" fill="#ff2079" transform="rotate(150)"/><rect x="-1.3" y="-11" width="2.6" height="5" rx="1" fill="#ff2079" transform="rotate(210)"/><rect x="-1.3" y="-11" width="2.6" height="5" rx="1" fill="#ff2079" transform="rotate(270)"/><rect x="-1.3" y="-11" width="2.6" height="5" rx="1" fill="#ff2079" transform="rotate(330)"/>
      <circle r="2.4" fill="#ff2079"/>
    </g>
  </g>
  <text x="86" y="52" font-family="Segoe UI,Arial,sans-serif" font-weight="700" font-size="19" fill="#ffffff">Web Automation Pipelines</text>
  <rect x="86" y="62" height="2.5" rx="1.25" fill="url(#g4)" width="0">
