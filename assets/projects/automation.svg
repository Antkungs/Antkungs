<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 170" role="img" aria-label="Web Automation Pipelines">
  <defs>
    <linearGradient id="g4" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#50fa7b"><animate attributeName="stop-color" values="#50fa7b;#ff2079;#00f0ff;#50fa7b" dur="8.5s" repeatCount="indefinite"/></stop><stop offset="50%" stop-color="#ff2079"><animate attributeName="stop-color" values="#ff2079;#00f0ff;#50fa7b;#ff2079" dur="8.5s" repeatCount="indefinite"/></stop><stop offset="100%" stop-color="#00f0ff"><animate attributeName="stop-color" values="#00f0ff;#50fa7b;#ff2079;#00f0ff" dur="8.5s" repeatCount="indefinite"/></stop></linearGradient>
    <filter id="f4" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 3D depth: dark extruded side + floor shadow behind the card -->
  <ellipse cx="230.0" cy="164" rx="200.0" ry="6" fill="#000000" opacity="0.45"/>
  <rect x="9" y="11" width="447" height="155" rx="14" fill="#04060c"/>
  <rect x="6" y="8" width="447" height="155" rx="14" fill="#080b14" stroke="#1b2233" stroke-width="1"/>
  <rect x="1.5" y="1.5" width="447" height="155" rx="14" fill="#0d1117" stroke="url(#g4)" stroke-width="2.5" filter="url(#f4)"/>
  <path d="M18 4.5 H430" stroke="#ffffff" stroke-width="1" opacity="0.14" stroke-linecap="round"/>
  <circle cx="428" cy="28" r="4" fill="#50fa7b">
    <animate attributeName="opacity" values="1;0.15;1" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="412" cy="28" r="3" fill="#ff2079">
