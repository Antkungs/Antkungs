<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 170" role="img" aria-label="Warehouse Management">
  <defs>
    <linearGradient id="g11" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#00f0ff"><animate attributeName="stop-color" values="#00f0ff;#a742f5;#ffde59;#00f0ff" dur="9.7s" repeatCount="indefinite"/></stop><stop offset="50%" stop-color="#a742f5"><animate attributeName="stop-color" values="#a742f5;#ffde59;#00f0ff;#a742f5" dur="9.7s" repeatCount="indefinite"/></stop><stop offset="100%" stop-color="#ffde59"><animate attributeName="stop-color" values="#ffde59;#00f0ff;#a742f5;#ffde59" dur="9.7s" repeatCount="indefinite"/></stop></linearGradient>
    <filter id="f11" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 3D depth: dark extruded side + floor shadow behind the card -->
  <ellipse cx="230.0" cy="164" rx="200.0" ry="6" fill="#000000" opacity="0.45"/>
  <rect x="9" y="11" width="447" height="155" rx="14" fill="#04060c"/>
  <rect x="6" y="8" width="447" height="155" rx="14" fill="#080b14" stroke="#1b2233" stroke-width="1"/>
  <rect x="1.5" y="1.5" width="447" height="155" rx="14" fill="#0d1117" stroke="url(#g11)" stroke-width="2.5" filter="url(#f11)"/>
  <path d="M18 4.5 H430" stroke="#ffffff" stroke-width="1" opacity="0.14" stroke-linecap="round"/>
  <circle cx="428" cy="28" r="4" fill="#00f0ff">
    <animate attributeName="opacity" values="1;0.15;1" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="412" cy="28" r="3" fill="#a742f5">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="2.4s" repeatCount="indefinite"/>
  </circle>
  
  <g transform="translate(18,26)" fill="none" stroke-width="2.2">
    <rect x="0" y="24" width="15" height="13" rx="2" stroke="#00f0ff"/>
    <path d="M7.5 24 v13 M0 30 h15" stroke="#00f0ff" opacity="0.5"/>
    <rect x="19" y="24" width="15" height="13" rx="2" stroke="#a742f5"/>
    <rect x="9.5" y="0" width="15" height="13" rx="2" stroke="#ffde59">
      <animate attributeName="y" values="-6;7;7" keyTimes="0;0.5;1" dur="2.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.25;0.9;1" dur="2.6s" repeatCount="indefinite"/>
    </rect>
  </g>
  <text x="86" y="52" font-family="Segoe UI,Arial,sans-serif" font-weight="700" font-size="19" fill="#ffffff">Warehouse Management</text>
  <rect x="86" y="62" height="2.5" rx="1.25" fill="url(#g11)" width="0">
    <animate attributeName="width" values="0;338;338;0" dur="9.7s" repeatCount="indefinite"/>
  </rect>
  <text x="26" y="104" font-family="Segoe UI,Arial,sans-serif" font-size="13.5" fill="#8b949e">Inventory management desktop app</text>
  <rect x="26" y="124" width="45" height="22" rx="11" fill="#00f0ff1a" stroke="#00f0ff" stroke-width="1"/><text x="48.5" y="139" text-anchor="middle" font-family="Courier New,monospace" font-size="11" fill="#00f0ff">Java</text><rect x="79" y="124" width="38" height="22" rx="11" fill="#a742f51a" stroke="#a742f5" stroke-width="1"/><text x="98.0" y="139" text-anchor="middle" font-family="Courier New,monospace" font-size="11" fill="#a742f5">OOP</text>
</svg>
