<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 170" role="img" aria-label="B2B Marketplace Platform">
  <defs>
    <linearGradient id="g0" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#ff2079"><animate attributeName="stop-color" values="#ff2079;#00f0ff;#a742f5;#ff2079" dur="7s" repeatCount="indefinite"/></stop><stop offset="50%" stop-color="#00f0ff"><animate attributeName="stop-color" values="#00f0ff;#a742f5;#ff2079;#00f0ff" dur="7s" repeatCount="indefinite"/></stop><stop offset="100%" stop-color="#a742f5"><animate attributeName="stop-color" values="#a742f5;#ff2079;#00f0ff;#a742f5" dur="7s" repeatCount="indefinite"/></stop></linearGradient>
    <filter id="f0" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 3D depth: dark extruded side + floor shadow behind the card -->
  <ellipse cx="230.0" cy="164" rx="200.0" ry="6" fill="#000000" opacity="0.45"/>
  <rect x="9" y="11" width="447" height="155" rx="14" fill="#04060c"/>
  <rect x="6" y="8" width="447" height="155" rx="14" fill="#080b14" stroke="#1b2233" stroke-width="1"/>
  <rect x="1.5" y="1.5" width="447" height="155" rx="14" fill="#0d1117" stroke="url(#g0)" stroke-width="2.5" filter="url(#f0)"/>
  <path d="M18 4.5 H430" stroke="#ffffff" stroke-width="1" opacity="0.14" stroke-linecap="round"/>
  <circle cx="428" cy="28" r="4" fill="#ff2079">
    <animate attributeName="opacity" values="1;0.15;1" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="412" cy="28" r="3" fill="#00f0ff">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="2.4s" repeatCount="indefinite"/>
  </circle>
  
  <g fill="none" stroke="#ff2079" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
    <animateTransform attributeName="transform" type="translate" values="18,28;18,25;18,28" dur="2.2s" repeatCount="indefinite"/>
    <path d="M1 3 h7 l5 19 h19 l5 -13 H10"/>
    <circle cx="16" cy="29" r="3.2" fill="#ff2079" stroke="none"/>
    <circle cx="29" cy="29" r="3.2" fill="#ff2079" stroke="none"/>
  </g>
  <text x="46" y="34" font-family="Courier New,monospace" font-size="10" fill="#a742f5">฿<animate attributeName="y" values="34;20" dur="2.2s" repeatCount="indefinite"/><animate attributeName="opacity" values="1;0" dur="2.2s" repeatCount="indefinite"/></text>
  <text x="86" y="52" font-family="Segoe UI,Arial,sans-serif" font-weight="700" font-size="19" fill="#ffffff">B2B Marketplace Platform</text>
  <rect x="86" y="62" height="2.5" rx="1.25" fill="url(#g0)" width="0">
    <animate attributeName="width" values="0;338;338;0" dur="7s" repeatCount="indefinite"/>
  </rect>
  <text x="26" y="104" font-family="Segoe UI,Arial,sans-serif" font-size="13.5" fill="#8b949e">Quotation → bidding → escrow payments • 4 portals</text>
