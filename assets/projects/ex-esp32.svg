<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 170" role="img" aria-label="ESP32 Power Monitor">
  <defs>
    <linearGradient id="g8" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#ffde59"><animate attributeName="stop-color" values="#ffde59;#50fa7b;#ff2079;#ffde59" dur="9.2s" repeatCount="indefinite"/></stop><stop offset="50%" stop-color="#50fa7b"><animate attributeName="stop-color" values="#50fa7b;#ff2079;#ffde59;#50fa7b" dur="9.2s" repeatCount="indefinite"/></stop><stop offset="100%" stop-color="#ff2079"><animate attributeName="stop-color" values="#ff2079;#ffde59;#50fa7b;#ff2079" dur="9.2s" repeatCount="indefinite"/></stop></linearGradient>
    <filter id="f8" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect x="1.5" y="1.5" width="457" height="167" rx="14" fill="#0d1117" stroke="url(#g8)" stroke-width="2.5" filter="url(#f8)"/>
