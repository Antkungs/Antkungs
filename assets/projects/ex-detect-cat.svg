      <animate attributeName="opacity" values="1;0.25;1" dur="1.6s" repeatCount="indefinite"/>
    </path>
    <rect x="0" y="19" width="40" height="2" fill="#a742f5" opacity="0.6">
      <animate attributeName="y" values="2;36;2" dur="3s" repeatCount="indefinite"/>
    </rect>
  </g>
  <text x="86" y="52" font-family="Segoe UI,Arial,sans-serif" font-weight="700" font-size="19" fill="#ffffff">Detect-Cat</text>
  <rect x="86" y="62" height="2.5" rx="1.25" fill="url(#g10)" width="0">
    <animate attributeName="width" values="0;338;338;0" dur="8.7s" repeatCount="indefinite"/>
  </rect>
  <text x="26" y="104" font-family="Segoe UI,Arial,sans-serif" font-size="13.5" fill="#8b949e">Cat detection with computer vision</text>
  <rect x="26" y="124" width="58" height="22" rx="11" fill="#ff20791a" stroke="#ff2079" stroke-width="1"/><text x="55.0" y="139" text-anchor="middle" font-family="Courier New,monospace" font-size="11" fill="#ff2079">Python</text><rect x="92" y="124" width="58" height="22" rx="11" fill="#00f0ff1a" stroke="#00f0ff" stroke-width="1"/><text x="121.0" y="139" text-anchor="middle" font-family="Courier New,monospace" font-size="11" fill="#00f0ff">OpenCV</text>
