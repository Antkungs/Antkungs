<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 170" role="img" aria-label="Detect-Cat">
  <defs>
    <linearGradient id="g10" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#ff2079"><animate attributeName="stop-color" values="#ff2079;#00f0ff;#a742f5;#ff2079" dur="8.7s" repeatCount="indefinite"/></stop><stop offset="50%" stop-color="#00f0ff"><animate attributeName="stop-color" values="#00f0ff;#a742f5;#ff2079;#00f0ff" dur="8.7s" repeatCount="indefinite"/></stop><stop offset="100%" stop-color="#a742f5"><animate attributeName="stop-color" values="#a742f5;#ff2079;#00f0ff;#a742f5" dur="8.7s" repeatCount="indefinite"/></stop></linearGradient>
    <filter id="f10" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 3D depth: dark extruded side + floor shadow behind the card -->
  <ellipse cx="230.0" cy="164" rx="200.0" ry="6" fill="#000000" opacity="0.45"/>
  <rect x="9" y="11" width="447" height="155" rx="14" fill="#04060c"/>
  <rect x="6" y="8" width="447" height="155" rx="14" fill="#080b14" stroke="#1b2233" stroke-width="1"/>
  <rect x="1.5" y="1.5" width="447" height="155" rx="14" fill="#0d1117" stroke="url(#g10)" stroke-width="2.5" filter="url(#f10)"/>
  <path d="M18 4.5 H430" stroke="#ffffff" stroke-width="1" opacity="0.14" stroke-linecap="round"/>
  <circle cx="428" cy="28" r="4" fill="#ff2079">
    <animate attributeName="opacity" values="1;0.15;1" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="412" cy="28" r="3" fill="#00f0ff">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="2.4s" repeatCount="indefinite"/>
  </circle>
  
  <g transform="translate(18,24)">
    <circle cx="20" cy="20" r="9" fill="none" stroke="#ff2079" stroke-width="2.2"/>
    <path d="M13 14 L11 6 L19 10 Z M27 14 L29 6 L21 10 Z" fill="#ff2079"/>
    <circle cx="17" cy="19" r="1.4" fill="#ff2079"/><circle cx="23" cy="19" r="1.4" fill="#ff2079"/>
