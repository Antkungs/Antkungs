<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 170" role="img" aria-label="QR Payment Gateway">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#00f0ff"><animate attributeName="stop-color" values="#00f0ff;#a742f5;#ffde59;#00f0ff" dur="8s" repeatCount="indefinite"/></stop><stop offset="50%" stop-color="#a742f5"><animate attributeName="stop-color" values="#a742f5;#ffde59;#00f0ff;#a742f5" dur="8s" repeatCount="indefinite"/></stop><stop offset="100%" stop-color="#ffde59"><animate attributeName="stop-color" values="#ffde59;#00f0ff;#a742f5;#ffde59" dur="8s" repeatCount="indefinite"/></stop></linearGradient>
    <filter id="f1" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 3D depth: dark extruded side + floor shadow behind the card -->
  <ellipse cx="230.0" cy="164" rx="200.0" ry="6" fill="#000000" opacity="0.45"/>
  <rect x="9" y="11" width="447" height="155" rx="14" fill="#04060c"/>
  <rect x="6" y="8" width="447" height="155" rx="14" fill="#080b14" stroke="#1b2233" stroke-width="1"/>
  <rect x="1.5" y="1.5" width="447" height="155" rx="14" fill="#0d1117" stroke="url(#g1)" stroke-width="2.5" filter="url(#f1)"/>
  <path d="M18 4.5 H430" stroke="#ffffff" stroke-width="1" opacity="0.14" stroke-linecap="round"/>
  <circle cx="428" cy="28" r="4" fill="#00f0ff">
    <animate attributeName="opacity" values="1;0.15;1" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="412" cy="28" r="3" fill="#a742f5">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="2.4s" repeatCount="indefinite"/>
  </circle>
  
  <g transform="translate(20,26)">
    <rect width="36" height="36" rx="4" fill="none" stroke="#00f0ff" stroke-width="2"/>
    <rect x="5" y="5" width="8" height="8" fill="none" stroke="#a742f5" stroke-width="2"/>
    <rect x="23" y="5" width="8" height="8" fill="none" stroke="#a742f5" stroke-width="2"/>
    <rect x="5" y="23" width="8" height="8" fill="none" stroke="#a742f5" stroke-width="2"/>
    <rect x="24" y="24" width="4" height="4" fill="#a742f5"/>
    <rect x="17" y="17" width="4" height="4" fill="#a742f5"/>
    <rect x="3" y="4" width="30" height="2.5" rx="1" fill="#ffde59" opacity="0.9">
      <animate attributeName="y" values="4;30;4" dur="2.8s" repeatCount="indefinite"/>
    </rect>
  </g>
  <text x="86" y="52" font-family="Segoe UI,Arial,sans-serif" font-weight="700" font-size="19" fill="#ffffff">QR Payment Gateway</text>
  <rect x="86" y="62" height="2.5" rx="1.25" fill="url(#g1)" width="0">
    <animate attributeName="width" values="0;338;338;0" dur="8s" repeatCount="indefinite"/>
  </rect>
  <text x="26" y="104" font-family="Segoe UI,Arial,sans-serif" font-size="13.5" fill="#8b949e">Stateless payment-gateway microservice</text>
  <rect x="26" y="124" width="92" height="22" rx="11" fill="#00f0ff1a" stroke="#00f0ff" stroke-width="1"/><text x="72.0" y="139" text-anchor="middle" font-family="Courier New,monospace" font-size="11" fill="#00f0ff">Spring Boot</text><rect x="126" y="124" width="65" height="22" rx="11" fill="#a742f51a" stroke="#a742f5" stroke-width="1"/><text x="158.5" y="139" text-anchor="middle" font-family="Courier New,monospace" font-size="11" fill="#a742f5">Java 21</text><rect x="199" y="124" width="58" height="22" rx="11" fill="#ffde591a" stroke="#ffde59" stroke-width="1"/><text x="228.0" y="139" text-anchor="middle" font-family="Courier New,monospace" font-size="11" fill="#ffde59">Docker</text>
</svg>
